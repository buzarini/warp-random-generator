<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARP для AmneziaWG</title>
    <meta name="description" content="Генератор конфигураций WARP для AmneziaWG">
    <link rel="icon" href="/static/cloud.ico">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <!-- Логотип -->
        <img src="/static/logo.svg" alt="logo" id="logo">

        <!-- Основной блок 350px -->
        <div class="card">
            <div class="header">
                <img src="/static/AWG.webp" alt="AWG" class="icon">
                <span class="title">AmneziaWG</span>
            </div>
            <div class="divider"></div>

            <!-- Поле ввода домена с крестиком -->
            <div class="input-wrapper">
                <input type="text" id="domainInput" placeholder="Домен (например, google.com)" value="www.google.com">
                <button id="clearBtn" class="clear-btn" aria-label="Очистить">✕</button>
            </div>

            <!-- Кнопка генерации -->
            <button id="generateBtn" class="gradient-btn">Сгенерировать</button>

            <!-- Самораскрывающийся статус -->
            <div id="status" class="status"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
