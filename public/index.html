<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WARP для AmneziaWG</title>
    <meta name="description" content="Генератор конфигураций WARP для AmneziaWG">
    <link rel="icon" href="/static/cloud.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/styles.css">
    <script defer src="/static/script.js"></script>
</head>
<body>
    <div class="wrapper">
        <img src="/static/logo.svg" alt="Logo" class="logo">
        <div class="card">
            <div class="header">
                <img src="/static/AWG.webp" alt="AmneziaWG" class="awg-icon">
                <span class="awg-title">AmneziaWG</span>
            </div>
            <hr class="gradient-line">
            <div class="input-row">
                <label>Введите домен:</label>
                <div class="select-wrapper">
                    <select id="levelSelect">
                        <option value="1">Safe Reorder</option>
                        <option value="2">+ Screw TLS Header</option>
                        <option value="3">++ Cut Screwed</option>
                        <option value="4" selected>+++ Cut Zeroes</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <input type="text" id="domainInput" placeholder="www.google.com" autocomplete="off">
                <button id="clearDomain" class="clear-btn" aria-label="Очистить">✖</button>
            </div>
            <button id="generateBtn" class="gradient-btn">Генерировать</button>
            <div id="status" class="status"></div>
            <hr class="gradient-line">
            <div class="footer-link">
                <a href="https://github.com/buzarini/warp-random-generator" target="_blank" class="gradient-link">Исходный код</a>
            </div>
        </div>
    </div>
</body>
</html>
